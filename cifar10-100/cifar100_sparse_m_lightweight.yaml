
model: swformer_freq_aware

epochs: 400
time_step: 4
layer: 4
dim: 384
patch_size: 4
mlp_ratio: 4
flblocks: 4
num_classes: 100
img_size: 32

vth_low_l1: 0.9
vth_high_l1: 1.1
vth_ll: 0.9
vth_hl: 1.0
vth_lh: 1.0
vth_hh: 1.2

use_freq_compensatory_mlp: true

freq_experts_ratio: 0.25
skip_base_mlp: true

data_dir: './data'
dataset: torch/cifar100

mean:
    - 0.5071
    - 0.4867
    - 0.4408
std:
    - 0.2675
    - 0.2565
    - 0.2761

crop_pct: 1.0
scale:
    - 1.0
    - 1.0
ratio: [1.0, 1.0]
color_jitter: 0.
interpolation: bicubic
train_interpolation: bicubic

aa: rand-m9-n1-mstd0.4-inc1
mixup: 0.5
mixup_off_epoch: 200
mixup_prob: 1.0
mixup_mode: batch
mixup_switch_prob: 0.5
cutmix: 0.0
reprob: 0.25
remode: const

opt: adamw
lr: 1.5e-3
min_lr: 1e-5
weight_decay: 6e-2
sched: cosine

warmup_epochs: 20
warmup_lr: 0.00001
cooldown_epochs: 10

batch_size: 128
val_batch_size: 128
workers: 4

amp: true
smoothing: 0.1
seed: 42

experiment: cifar100_sparse_m_lightweight
