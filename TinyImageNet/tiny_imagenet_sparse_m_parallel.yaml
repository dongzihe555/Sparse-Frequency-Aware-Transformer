
model: swformer_freq_aware

epochs: 200
time_step: 4
layer: 4
dim: 384
patch_size: 4
mlp_ratio: 4
flblocks: 4
num_classes: 200
img_size: 64

vth_low_l1: 0.9
vth_high_l1: 1.1
vth_ll: 0.9
vth_hl: 1.0
vth_lh: 1.0
vth_hh: 1.2

use_freq_compensatory_mlp: true

freq_experts_ratio: 0.25

l2_sparsity_mode: ener_ch
l2_tau_ll: 0.01
l2_tau_hl: 0.02
l2_tau_lh: 0.02
l2_tau_hh: 0.05

ener_gate_low: 0.4
ener_gate_high: 0.6
ener_sigma: 0.2
ener_tau_E: 1.0

data_dir: './data/tiny-imagenet-200'
dataset: ''

mean:
    - 0.485
    - 0.456
    - 0.406
std:
    - 0.229
    - 0.224
    - 0.225

crop_pct: 1.0
scale:
    - 1.0
    - 1.0
ratio: [1.0, 1.0]
color_jitter: 0.
interpolation: bicubic
train_interpolation: bicubic

aa: rand-m9-n1-mstd0.4-inc1
mixup: 0.5
mixup_off_epoch: 100
mixup_prob: 1.0
mixup_mode: batch
mixup_switch_prob: 0.5
cutmix: 0.0
reprob: 0.25
remode: const

opt: adamw
lr: 1.5e-3
min_lr: 1e-5
weight_decay: 6e-2
sched: cosine

warmup_epochs: 20
warmup_lr: 0.00001
cooldown_epochs: 10

batch_size: 128
val_batch_size: 128
workers: 4

amp: true
smoothing: 0.1
seed: 42

experiment: tiny_imagenet_sparse_m_parallel
